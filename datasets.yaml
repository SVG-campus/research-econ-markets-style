version: 1
pillar: research-econ-markets-style
title: "Economics, markets, style signals"
streaming_preferred: true

huggingface:
  - repo_id: nyu-mml/glue
    config: cola
    split: train[:2%]
    streaming: true
    note: Tiny GLUE stream for CI / dataloader sanity only — **not** macro, market, or consumer demand evidence (text proxy; replace when charters demand native econ tables).
  - repo_id: Yelp/yelp_review_full
    split: train[:1%]
    streaming: true
    note: Hub **text review stream** pinned for `CHARTER_YELP_STREAM_SMOKE` + pytest — sentiment / language proxy only; not a tradable signal, equilibrium object, or ID’d causal estimand on its own (watch schema drift).

kaggle: []


search_keywords: []

reference_streams:
  - name: FRED (Federal Reserve Economic Data)
    url: https://fred.stlouisfed.org/
    note: **Off-Hub reference** macro series IDs for baselines (API / terms of use) — not the same artifact as the HF Yelp charter stream; use when charters demand published national accounts or rates series.

